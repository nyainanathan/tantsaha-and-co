openapi: 3.0.0
info:
  title: Tantsaha & Co
  description: Une API REST pour gérer la communauté croissante de ceux qu'on appelle les « Tantsaha ».
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
paths:
  /collectivity:
    post:
      summary: Creer une nouvelle collectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        201:
          description: Collectivite cree avec succes
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Collectivite'
        400:
          description: Echec dans le cas ou les conditions ne sont pas respectees
          content:
            text/plain:
              example: "Vous devez avoir au moins 10 membres avec 5 d'une ancienete de 6 mois"

  /members:
    post:
      summary: Creer un nouveau membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NouveauMembre'
      responses:
        201:
          description: Membre cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        400:
          $ref: '#/components/responses/BadRequest'

  /collectivity/{id}/members:
    post:
      summary: Ajouter un membre dans une collectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdhesionMembre'
      responses:
        201:
          description: Membre ajoute
        400:
          $ref: '#/components/responses/BadRequest'
components:
  parameters:
    CollectiviteId:
      name: id
      in: path
      required: true
      schema:
        type: integer

    MembreId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Requete invalide
      content:
        text/plain:
          example: "Erreur de validation"

  schemas:
    CollectiviteBaseComponent:
      type: object
      properties:
        specialite:
          type: string
          example: "Manioc"
        ville:
          type: string
          example: 'Ambatondrazaka'
    CollectiviteCreation:
      allOf:
        - $ref: '#/components/schemas/CollectiviteBaseComponent'
        - type: object
          properties:
            autorisation:
              $ref: '#/components/schemas/Autorisation'
            membres:
              type: array
              items:
                $ref: '#/components/schemas/NouveauMembre'
              minItems: 10
    Collectivite: 
      allOf:
        - $ref: '#/components/schemas/CollectiviteBaseComponent'
        - type: object
          properties:
            nom:
              type: string
              example: 'COllectivite manioc du sud'
            membres:
              type: array
              items: 
                $ref: '#/components/schemas/Membre'
    NouveauMembre:
      type: object
      properties:
        nom:
          type: string
          example: 'John'
        prenom:
          type: string
          example: 'Doe'
        adresse:
          type: string
          example: 'LOT 67 BIS'
        metier:
          type: string
          example: 'Agriculteur'
        role: 
          $ref: '#/components/schemas/Role'
        telephone:
          type: string
          example: '032 01 234 56'
        email:
          type: string
          format: email
          example: 'johndoe@gmail.com'
    Membre:
      allOf:
        - $ref: '#/components/schemas/NouveauMembre'
        - type: object
          properties:
            dateAdhesion:
              type: string
              format: date
              example: '2026-04-20'
    Role:
      type: string
      enum:
        - PRESIDENT
        - VICE_PRESIDENT
        - TRESORIER
        - SECRETAIRE
        - CONFIRME
        - JUNIOR
    Autorisation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titre:
          type: string
          example: 'Autorisation 2026/12/56'
        dateCreation:
          type: string
          format: date
          example: '2026-04-20'
        details:
          type: string
    AdhesionMembre:
      type: object
      properties:
        membreId:
          type: integer
          example: 1
        parrainId:
          type: integer
          example: 2