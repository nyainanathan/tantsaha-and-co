openapi: 3.0.0
info:
  title: Tantsaha & Co
  description: Une API REST pour gérer la communauté croissante de ceux qu'on appelle les « Tantsaha ».
  version: 1.0.0
tags:
  - name: Collectivities
    description: Operations liees aux collectivites
  - name: Members
    description: Operations liees aux membres
  - name: Cotisations
    description: Operations liees aux cotisations
  - name: Paiements
    description: Operations liees aux paiements
  - name: Activites
    description: Operations liees aux activites
  - name: Tresorerie
    description: Operations liees aux comptes de tresorerie
  - name: Presence
    description: Operations liees aux presences à des activites
  - name: Stats
    description: Operations liees aux statistiques d'une collectivite

servers:
  - url: 'http://localhost:8080'
paths:
  /collectivity:
    post:
      tags:
        - Collectivities
      summary: Creer une nouvelle collectivite
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        201:
          description: Collectivite cree avec succes
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Collectivite'
        400:
          description: Echec dans le cas ou les conditions ne sont pas respectees
          content:
            text/plain:
              example: "Vous devez avoir au moins 10 membres avec 5 d'une ancienete de 6 mois"

  /members:
    post:
      tags:
        - Members
      summary: Creer un nouveau membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NouveauMembre'
      responses:
        201:
          description: Membre cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        400:
          $ref: '#/components/responses/BadRequest'

  /collectivity/{id}/members:
    post:
      tags:
        - Members
      summary: Ajouter un membre dans une collectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdhesionMembre'
      responses:
        201:
          description: Membre ajoute
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
  /collectivity/{id}/applications:
    post:
      tags:
        - Members
      summary: Soumettre une candidature
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidatureCreation'
      responses:
        201:
          description: Candidature soumise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidature'

  /collectivity/{id}/applications/{applicationId}/validate:
    post:
      tags:
        - Members
      summary: Valider une candidature
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Candidature validee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidature'
        404:
          $ref: "#/components/responses/NotFound"

  /collectivity/{id}/applications/{applicationId}/reject:
    post:
      tags:
        - Members
      summary: Refuser une candidature
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                motif:
                  type: string
                  example: "Parrains insuffisants"
      responses:
        200:
          description: Candidature refusee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidature'
        404:
          $ref: '#/components/responses/NotFound'


  /collectivity/{id}/accounts:
    get:
      tags:
        - Tresorerie
      summary: Lister les comptes d'une collectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        200:
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
        404:
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Tresorerie
      summary: Creer un compte pour une collectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreation'
      responses:
        201:
          description: Compte cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/accounts/{accountId}:
    get:
      tags:
        - Tresorerie
      summary: Obtenir un compte
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/AccountId'
      responses:
        200:
          description: Compte trouve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/cotisations:
    get:
      tags:
        - Cotisations
      summary: obtenir des infos sur toues les cotisations
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        200:
          description: Liste de toutes les cotisations
          content:
            application/json:
              schema:  
                type: array
                items:
                  $ref: '#/components/schemas/Cotisation'
        404:
          $ref: '#/components/responses/NotFound'
    post: 
      tags:
        - Cotisations
      summary: create a new cotisation to pay
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/CotisationCreation'
      responses:
        201:
          description: Cotisation cree
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Cotisation'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
  /collectivity/{id}/cotisations/{cotisationId}:
      get:
        tags:
          - Cotisations
        summary: Obtenir info sur une cotisation
        parameters:
          - $ref: '#/components/parameters/CollectiviteId'
          - $ref: '#/components/parameters/CotisationId'
        responses:
          200:
            description: La collectivite
            content:
              application/json:
                schema:  
                  $ref: '#/components/schemas/Cotisation'
          404:
            $ref: '#/components/responses/NotFound'
      patch:
        tags:
          - Cotisations
        summary: Mettre a jour une cotisation
        parameters:
          - $ref: '#/components/parameters/CollectiviteId'
          - $ref: '#/components/parameters/CotisationId'
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotisationUpdate'
        responses:
          200:
            description: cotisation mise a jour
            content:
              application/json:
                schema:  
                  $ref: '#/components/schemas/Cotisation'
          400:
            $ref: '#/components/responses/BadRequest'
          404:
            $ref: '#/components/responses/NotFound'
      delete:
        tags:
          - Cotisations
        summary: Supprimer une cotisation
        parameters:
          - $ref: '#/components/parameters/CollectiviteId'
          - $ref: '#/components/parameters/CotisationId'
        responses:
          204:
            description: Cotisation supprimee
          400:
            $ref: '#/components/responses/BadRequest'
          404:
            $ref: '#/components/responses/NotFound'
  /collectivity/{id}/paiements:
    post:
      tags:
        - Paiements
      summary: creer un nouveau paiementType
      parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/PaiementCreation'
      responses:
        201:
          description: Paiement enregistere
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Paiement'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/activites:
    get:
      tags:
        - Activites
      summary: Lister toutes les activites de la collectivites 
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        200:
          description: Liste des toutes les activites
          content:
            application/json:
              schema:  
                type: array
                items: 
                  $ref: '#/components/schemas/Activite'
        404:
          $ref: '#/components/responses/NotFound'
    post: 
      tags:
        - Activites
      summary: Creer une nouvelle activite 
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/ActiviteCreation'
      responses:
        201:
          description: activite cree
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Activite'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
  /collectivity/{id}/activites/{activiteId}:
    get:
      tags:
        - Activites
      summary: Obtenir info sur une activite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        200:
          description: Activite demandee
          content:
            application/json:
              schema:  
                $ref: '#/components/schemas/Activite'
        404:
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Activites
      summary: Mettre a jour une activite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdate'
      responses:
        200:
          description: Activite mise a jour
          content:
            application/json:
              schema:  
                $ref: '#/components/schemas/Activite'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Activites
      summary: Supprimer une activite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        204:
          description: Activite supprimee
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/activites/{activiteId}/presences:
    post:
      tags:
        - Presence
      summary: Enregistrer la feuille de presence d'une activite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceBatchCreation'
      responses:
        201:
          description: Feuille de presence enregistree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceBatch'

    get:
      tags:
        - Presence
      summary: Liste des presences d'une activite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        200:
          description: Liste des presences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Presence'
  /collectivity/{id}/membre/{id}/assiduitue:
    get:
      tags:
        - Members
      summary: Taux d'assiduite sur une periode donnee
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Taux d'assiduite
          content:
            application/json:
              schema:
                type: number
                format: double
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/membre/{id}/encaissement:
    get:
      tags:
        - Members
      summary: Encaissement sur une periode donnee
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Encaissement sur une periode donnee
          content:
            application/json:
              schema:
                type: number
                format: double
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/membre/{id}/impayee:
    get:
      tags:
        - Members
      summary: Les potentiels impayee sur une periode donnee
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Potentiels impayee
          content:
            application/json:
              schema:
                type: number
                format: double
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/assiditue:
    get:
      tags:
        - Stats
      summary: Le taux d'assiduite total sur une periode donnes
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Taux d'assiduite globale pour cette collectivite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteAssiduite'
        404:
          $ref: '#/components/responses/NotFound'


  /collectivity/{id}/membreAJour:
    get:
      tags:
        - Stats
      summary: Le taux de membres a jour dans leur paiement sur une periode donnes
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Taux de membres a jour pour cette collectivite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteMembreAJour'
        404:
          $ref: '#/components/responses/NotFound'

  /collectivity/{id}/nouveauMembres:
    get:
      tags:
        - Stats
      summary: Le nombre de nouveaux membres sur une periode donnes
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Nombre de nouveaux membres pour cette collectivite sur cette periode donnees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteNouveauMembres'
        404:
          $ref: '#/components/responses/NotFound'

  /federation/assiduitue:
    get:
      tags:
        - Stats
      summary: Le taux d'assiduite global de toutes les collectivites sur une periode donnee
      parameters:
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Taux d'assiduite global pour toutes les collectivites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteAssiduite'

  /federation/membreAJour:
    get:
      tags:
        - Stats
      summary: Le taux de membres a jour dans leur paiement sur une periode donnee pour toutes les collectivites
      parameters:
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Taux de membres a jour pour toutes les collectivites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteMembreAJour'

  /federation/nouveauMembres:
    get:
      tags:
        - Stats
      summary: Le nombre de nouveaux membres sur une periode donnee pour toutes les collectivites
      parameters:
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        200:
          description: Nombre de nouveaux membres pour toutes les collectivites sur cette periode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteNouveauMembres'

components:
  parameters:
    CollectiviteId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    CotisationId:
      name: cotisationId
      in: path
      required: true
      schema:
        type: integer

    MembreId:
      name: membreId
      in: path
      required: true
      schema:
        type: integer
    ActiviteId:
      name: activiteId
      in: path
      required: true
      schema:
        type: integer

    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: integer

    FromParam:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date

    ToParam:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date

  responses:
    BadRequest:
      description: Requete invalide
      content:
        text/plain:
          example: "Erreur de validation"
    NotFound:
      description: Ressource non trouvee
      content:
        text/plain:
          example: "Ressource non trouvee"


  schemas:

    CollectiviteAssiduite:
      type: object
      properties:
        nombreActivite:
          type: integer
          example: 1
        nombreParcitipants:
          type: integer
          example: 10
        assiduite:
          type: number
          format: decimal
          example: 67.2

    CollectiviteMembreAJour:
      type: object
      properties:
        totalMembre:
          type: integer
          example: 23
        membreAJour:
          type: integer
          example: 12
        tauxAJour:
          type: number
          format: decimal
          example: 45.8

    CollectiviteNouveauMembres:
      type: object
      properties:
        membres:
          type: array
          items:
            $ref: '#/components/schemas/Membre'
        total :
          type: integer
          example: 21


    ActiviteCreation:
      type: object
      properties:
        titre:
          type: string
          example: 'Reunion'
        type:
          $ref: '#/components/schemas/ActiviteType'
        estOuvertATous:
          type: boolean
        obligatoirePour:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        date:
          type: string
          format: date
        recurrence:
          $ref: '#/components/schemas/ActiviteRecurrence'

    ActiviteType:
      type: string
      enum:
        - ASSEMBLE_GENERALE
        - FORMATION_OBLOGATOIRE
        - EXCEPTIONNELLE

    ActiviteRecurrence:
      type: object
      properties:
        semaine:
          type: integer
          minimum: 1
          maximum: 5
        jour:
          $ref: '#/components/schemas/JourDeSemaine'

    JourDeSemaine:
      type: string
      enum:
        - LUNDI
        - MARDI
        - MERCREDI
        - JEUDI
        - VENDREDI
        - SAMEDI
        - DIMANCHE

    Activite:
      allOf:
        - $ref: '#/components/schemas/ActiviteCreation'
        - type: object
          properties:
           id:
            type: integer
            example: 1

    ActiviteUpdate:
      type: object
      properties:
        titre:
          type: string
          example: 'Reunion'
        type:
          $ref: '#/components/schemas/ActiviteType'
        estOuvertATous:
          type: boolean
        obligatoirePour:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        date:
          type: string
          format: date
        recurrence:
          $ref: '#/components/schemas/ActiviteRecurrence'

    PaiementCreation:
      type: object
      properties:
        membreId:
          type: integer
          example: 1
        montant:
          type: number
          format: decimal
          minimum: 0
          example: 67000
        transactionType:
          $ref: "#/components/schemas/TransactionType"
        transactionReference:
          type: string
          example: '20260420.1415MG'
        destinataireId:
          type: string
          example: '034 12 345 67'
        paiementType:
          $ref : '#/components/schemas/PaiementType'
        description:
          type: string
          example: "Paiement d'adhesion noveau membre"
        cotisationId:
          type: integer
          example: 1
        activiteId:
          type: integer
          example: 1

    Paiement:
      allOf:
        - $ref: '#/components/schemas/PaiementCreation'
        - type: object
          properties:
            id:
              type: integer
              example: 1

    TransactionType:
      type: string
      enum:
        - CASH
        - MOBILE_MONEY
        - VIREMENT

    PaiementType:
      type: string
      enum:
        - COTISATION_PERIODIQUE
        - COTISATION_EXCEPTIONNELLE
        - VERSEMENT_FEDERATION
        - ADHESION
        - ACTIVITE
        - FORMATION
        - AUTRE
    CollectiviteBaseComponent:
      type: object
      properties:
        specialite:
          type: string
          example: "Manioc"
        ville:
          type: string
          example: 'Ambatondrazaka'

    CollectiviteCreation:
      allOf:
        - $ref: '#/components/schemas/CollectiviteBaseComponent'
        - type: object
          properties:
            autorisation:
              $ref: '#/components/schemas/Autorisation'
            membres:
              type: array
              items:
                $ref: '#/components/schemas/NouveauMembre'
              minItems: 10

    Collectivite:
      allOf:
        - $ref: '#/components/schemas/CollectiviteBaseComponent'
        - type: object
          properties:
            nom:
              type: string
              example: 'COllectivite manioc du sud'
            membres:
              type: array
              items:
                $ref: '#/components/schemas/Membre'

    NouveauMembre:
      type: object
      properties:
        nom:
          type: string
          example: 'John'
        prenom:
          type: string
          example: 'Doe'
        adresse:
          type: string
          example: 'LOT 67 BIS'
        metier:
          type: string
          example: 'Agriculteur'
        role:
          $ref: '#/components/schemas/Role'
        telephone:
          type: string
          example: '032 01 234 56'
        email:
          type: string
          format: email
          example: 'johndoe@gmail.com'
        dateNaissance:
          type: string
          format: date
        genre:
          type: string
          enum:
            - M
            - F
    Membre:
      allOf:
        - $ref: '#/components/schemas/NouveauMembre'
        - type: object
          properties:
            dateAdhesion:
              type: string
              format: date
              example: '2026-04-20'
    
    Role:
      type: string
      enum:
        - PRESIDENT
        - VICE_PRESIDENT
        - TRESORIER
        - SECRETAIRE
        - CONFIRME
        - JUNIOR
    
    Autorisation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titre:
          type: string
          example: 'Autorisation 2026/12/56'
        dateCreation:
          type: string
          format: date
          example: '2026-04-20'
        details:
          type: string
    
    AdhesionMembre:
      type: object
      properties:
        membreId:
          type: integer
          example: 1
        parrains:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/Parrainage"
        fraisAdhesion:
          type: number
          enum: [50000]
        cotisationAnnuelle:
          type: number
          readOnly: true
          example: 200000

    CotisationCreation:
      type: object
      properties:
        titre:
          type: string
          example: 'Maintenance infrastructure'
        montant:
          type: number
          example: 15000
        type:
          $ref: '#/components/schemas/CotisationType'

    CotisationType:
      type: string
      enum:
        - MENSUEL
        - ANNUEL
        - PONCTUEL
    
    Cotisation: 
      allOf:
        - $ref: '#/components/schemas/CotisationCreation'
        - type: object
          properties:
            id:
              type: integer
              example: 1
            commencerLe:
              type: string
              format: date
    
    CotisationUpdate:
      type: object
      properties:
        titre:
          type: string
          example: 'Operation sandwiiich'
        montant:
          type: number
          example: 4000

    CompteBase:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - CAISSE
            - BANCAIRE
            - MOBILE_MONEY
    CompteCaisse:
      allOf:
        - $ref: '#/components/schemas/CompteBase'
        - type: object
          properties:
            id:
              type: integer
            solde:
              type: number
    CompteBancaire:
      allOf:
        - $ref: '#/components/schemas/CompteBase'
        - type: object
          properties:
            id:
              type: integer
              example: 1
            titulaire:
              type: string
              example: "Ania Su"
            nomBanque:
              type: string
            numeroCompte:
              type: string
              pattern: "^[0-9]{23}$"
              example: "12345678912345678912345"
            solde:
              type: number
              example: "555555555555555555"
    CompteMobileMoney:
      allOf:
        - $ref: '#/components/schemas/CompteBase'
        - type: object
          properties:
            id:
              type: integer
              example: 1
            titulaire:
              type: string
              example: "Ania Su"
            service:
              type: string
            telephone:
              type: string
              example: "0346878912"
            solde:
              type: number
              example: "156275"

    CompteCreation:
      oneOf:
        - $ref: '#/components/schemas/CaisseCreation'
        - $ref: '#/components/schemas/CompteBancaireCreation'
        - $ref: '#/components/schemas/CompteMobileMoneyCreation'

    Compte:
      oneOf:
        - $ref: '#/components/schemas/CompteCaisse'
        - $ref: '#/components/schemas/CompteBancaire'
        - $ref: '#/components/schemas/CompteMobileMoney'

    CaisseCreation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [ CAISSE ]
    CompteBancaireCreation:
      type: object
      required:
        - type
        - titulaire
        - nomBanque
        - numeroCompte
      properties:
        type:
          type: string
          enum: [ BANCAIRE ]
        titulaire:
          type: string
        nomBanque:
          type: string
          enum: [ BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM ]
        numeroCompte:
          type: string
          description: "23 chiffres"
          pattern: "^[0-9]{23}$"
          example: "12345123451234512345123"

    CompteMobileMoneyCreation:
      type: object
      required:
        - type
        - titulaire
        - service
        - telephone
      properties:
        type:
          type: string
          enum: [ MOBILE_MONEY ]
        titulaire:
          type: string
        service:
          type: string
          enum: [ ORANGE_MONEY, MVOLA, AIRTEL_MONEY ]
        telephone:
          type: string

    PresenceCreation:
      oneOf:
        - $ref: '#/components/schemas/PresenceInterne'
        - $ref: '#/components/schemas/PresenceExterne'

    PresenceInterne:
      type: object
      required:
        - membreId
        - present
      properties:
        membreId:
          type: integer
          example: 1
        present:
          type: boolean
        excuse:
          type: boolean
        motif:
          type: string
    PresenceExterne:
      type: object
      required:
        - nom
        - prenom
        - present
      properties:
        nom:
          type: string
          example: "Ania"
        prenom:
          type: string
          example: "Su"
        collectiviteOrigine:
          type: string
          example: "Collectivite vinland saga"
        present:
          type: boolean

    Presence:
      allOf:
        - $ref: '#/components/schemas/PresenceCreation'
        - type: object
          properties:
            id:
              type: integer
              example: 1
            statut:
              type: string
              enum:
                - INTERNE
                - EXTERNE

    PresenceBatchCreation:
      type: object
      properties:
        presences:
          type: array
          items:
            $ref: '#/components/schemas/PresenceCreation'

    PresenceBatch:
      type: object
      properties:
        activiteId:
          type: integer
        presences:
          type: array
          items:
            $ref: '#/components/schemas/Presence'

    Parrainage:
      type: object
      required:
        - parrainId
        - relation
      properties:
        parrainId:
          type: integer
          example: 2
        relation:
          type: string
          example: "ami"

    CandidatureCreation:
      type: object
      required:
        - candidat
        - parrains
      properties:
        candidat:
          $ref: '#/components/schemas/NouveauMembre'
        parrains:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Parrainage'
    Candidature:
      allOf:
        - $ref: '#/components/schemas/CandidatureCreation'
        - type: object
          properties:
            id:
              type: integer
            statut:
              type: string
              enum:
                - EN_ATTENTE
                - ACCEPTEE
                - REFUSEE